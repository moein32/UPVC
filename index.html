
<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#001f3f" />
    <title>Lumina UPVC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts with CORS support for html2canvas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
      :root { --color-navy: #001f3f; }
      body {
        font-family: 'Vazirmatn', sans-serif;
        background-color: #f3f4f6;
        direction: rtl;
        unicode-bidi: embed;
        margin: 0;
        padding: 0;
      }
      
      #pdf-export-root {
        position: absolute;
        left: -9999px;
        top: 0;
        width: 800px;
        background: white;
        z-index: -100;
        direction: rtl;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-router-dom": "https://esm.sh/react-router-dom@^7.10.1",
        "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
        "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
        "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react-i18next": "https://esm.sh/react-i18next@^16.5.0",
        "i18next": "https://esm.sh/i18next@^25.7.2"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="pdf-export-root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
