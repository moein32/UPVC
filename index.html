<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#001f3f" />
    
    <!-- PWA Settings -->
    <link rel="icon" type="image/png" href="/logo.png">
    
    <!-- iOS Specific Settings -->
    <link rel="apple-touch-icon" href="/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NexWin">
    
    <title>NexWin</title>
    
    <!-- Critical Connection Pre-optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Optimized Font Loading -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap&font-display=swap" rel="stylesheet" crossorigin="anonymous">
    
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      :root { --color-navy: #001f3f; }
      body {
        font-family: 'Vazirmatn', sans-serif;
        background-color: #f3f4f6;
        direction: rtl;
        unicode-bidi: embed;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none;
        /* Prevent layout shift during font load */
        text-rendering: optimizeLegibility;
      }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      @media print {
        .no-print { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="pdf-export-root"></div>

    <script type="module" src="/main.tsx"></script>
  </body>
</html>
