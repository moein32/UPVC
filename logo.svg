<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#172554;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#grad)"/>
  
  <!-- Left Window (W shape implication) -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="160" height="312" rx="10" fill="none" stroke="white" stroke-width="25"/>
    <line x1="0" y1="100" x2="160" y2="100" stroke="white" stroke-width="25"/>
    <line x1="80" y1="0" x2="80" y2="312" stroke="white" stroke-width="25"/>
  </g>

  <!-- Right Door (D shape implication) -->
  <g transform="translate(270, 100)">
    <path d="M0 0 H 120 A 40 40 0 0 1 160 40 V 272 A 40 40 0 0 1 120 312 H 0 Z" fill="none" stroke="white" stroke-width="25"/>
    <!-- Handle -->
    <line x1="120" y1="140" x2="120" y2="180" stroke="white" stroke-width="25" stroke-linecap="round"/>
  </g>
  
  <!-- Connecting Line / Monogram Feel -->
  <path d="M240 412 L270 412" stroke="#60a5fa" stroke-width="20" stroke-linecap="round" opacity="0.5"/>
</svg>